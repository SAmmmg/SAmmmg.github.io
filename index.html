<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>个人博客</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">{{ message }}</div>

        <script>
            const { createApp, ref } = Vue

            const app = createApp({
                setup() {
                    const message = ref("Hello vue!")
                    return {
                        message,
                    }
                },
            })
            app.mount("#app")
        </script>
    </body>
</html>
